<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 780" width="420" height="780">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2d2d3f"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30,30,46,0.68)"/>
      <stop offset="100%" stop-color="rgba(30,30,46,0.76)"/>
    </linearGradient>
    <linearGradient id="btnNum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(70,70,90,0.6)"/>
      <stop offset="100%" stop-color="rgba(60,60,80,0.6)"/>
    </linearGradient>
    <linearGradient id="btnFn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(120,120,140,0.4)"/>
      <stop offset="100%" stop-color="rgba(105,105,125,0.4)"/>
    </linearGradient>
    <linearGradient id="btnOp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,159,10,0.92)"/>
      <stop offset="100%" stop-color="rgba(240,145,5,0.92)"/>
    </linearGradient>
    <linearGradient id="btnSci" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(55,55,75,0.5)"/>
      <stop offset="100%" stop-color="rgba(50,50,70,0.5)"/>
    </linearGradient>
    <linearGradient id="btnSciHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(75,75,100,0.6)"/>
      <stop offset="100%" stop-color="rgba(65,65,90,0.6)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="opGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#ff9f0a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="780" fill="url(#bg)" rx="0"/>

  <!-- Calculator Window -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="340" height="720" rx="28" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="40" y="30" width="340" height="720" rx="28" fill="url(#glass)"/>
    <rect x="40" y="30" width="340" height="720" rx="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </g>

  <!-- ========== HEADER ========== -->

  <!-- Window Controls -->
  <circle cx="62" cy="54" r="6.5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="82" cy="54" r="6.5" fill="#febc2e" opacity="0.9"/>
  <circle cx="102" cy="54" r="6.5" fill="#28c840" opacity="0.9"/>

  <!-- Mode Toggle (Sci selected) -->
  <rect x="255" y="44" width="105" height="22" rx="11" fill="rgba(120,120,140,0.2)"/>
  <rect x="255" y="47" width="48" height="16" rx="8" fill="rgba(255,255,255,0.08)"/>
  <rect x="309" y="47" width="48" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="268" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.5">Basic</text>
  <text x="333" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle" letter-spacing="0.5">Sci</text>

  <!-- ========== DISPLAY ========== -->

  <!-- Mode indicator -->
  <text x="356" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="rgba(255,159,10,0.5)" text-anchor="end" letter-spacing="0.5">Scientific</text>

  <!-- Expression -->
  <text x="356" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="end">sin(30) =</text>

  <!-- Result -->
  <text x="356" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="300" fill="#ffffff" text-anchor="end" letter-spacing="-1">0.5</text>

  <!-- ========== SCIENTIFIC PANEL (Open) ========== -->

  <!-- Panel divider line -->
  <line x1="60" y1="168" x2="360" y2="168" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Sci Row 1: (, ), sin, cos -->
  <g>
    <!-- ( -->
    <rect x="60" y="180" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="93.5" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">(</text>
    <!-- ) -->
    <rect x="136" y="180" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="169.5" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">)</text>
    <!-- sin (pressed/highlighted) -->
    <rect x="212" y="180" width="67" height="38" rx="9" fill="url(#btnSciHover)" filter="url(#btnShadow)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="245.5" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.95)" text-anchor="middle">sin</text>
    <!-- cos -->
    <rect x="288" y="180" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="321.5" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">cos</text>
  </g>

  <!-- Sci Row 2: tan, log, ln, √ -->
  <g>
    <rect x="60" y="226" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="93.5" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">tan</text>
    <rect x="136" y="226" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="169.5" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">log</text>
    <rect x="212" y="226" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="245.5" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">ln</text>
    <rect x="288" y="226" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="321.5" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">√</text>
  </g>

  <!-- Sci Row 3: x², x³, 1/x, 10ˣ -->
  <g>
    <rect x="60" y="272" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="93.5" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">x²</text>
    <rect x="136" y="272" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="169.5" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">x³</text>
    <rect x="212" y="272" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="245.5" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">1/x</text>
    <rect x="288" y="272" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="321.5" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">10ˣ</text>
  </g>

  <!-- Sci Row 4: π, e, n!, |x| -->
  <g>
    <rect x="60" y="318" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="93.5" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">π</text>
    <rect x="136" y="318" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="169.5" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">e</text>
    <rect x="212" y="318" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="245.5" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">n!</text>
    <rect x="288" y="318" width="67" height="38" rx="9" fill="url(#btnSci)" filter="url(#btnShadow)"/>
    <text x="321.5" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">|x|</text>
  </g>

  <!-- Divider between sci panel and basic buttons -->
  <line x1="60" y1="370" x2="360" y2="370" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ========== BASIC BUTTONS ========== -->

  <!-- Row 1: AC, ±, %, ÷ -->
  <g>
    <rect x="50" y="385" width="70" height="58" rx="12" fill="url(#btnFn)" filter="url(#btnShadow)"/>
    <text x="85" y="421" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#fff" text-anchor="middle">AC</text>
    <rect x="130" y="385" width="70" height="58" rx="12" fill="url(#btnFn)" filter="url(#btnShadow)"/>
    <text x="165" y="421" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">±</text>
    <rect x="210" y="385" width="70" height="58" rx="12" fill="url(#btnFn)" filter="url(#btnShadow)"/>
    <text x="245" y="421" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">%</text>
    <rect x="290" y="385" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#fff" text-anchor="middle">÷</text>
  </g>

  <!-- Row 2: 7, 8, 9, × -->
  <g>
    <rect x="50" y="453" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="85" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">7</text>
    <rect x="130" y="453" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="165" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">8</text>
    <rect x="210" y="453" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="245" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">9</text>
    <rect x="290" y="453" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#fff" text-anchor="middle">×</text>
  </g>

  <!-- Row 3: 4, 5, 6, − -->
  <g>
    <rect x="50" y="521" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="85" y="557" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">4</text>
    <rect x="130" y="521" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="165" y="557" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">5</text>
    <rect x="210" y="521" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="245" y="557" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">6</text>
    <rect x="290" y="521" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="557" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#fff" text-anchor="middle">−</text>
  </g>

  <!-- Row 4: 1, 2, 3, + -->
  <g>
    <rect x="50" y="589" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="85" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">1</text>
    <rect x="130" y="589" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="165" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">2</text>
    <rect x="210" y="589" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="245" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">3</text>
    <rect x="290" y="589" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#fff" text-anchor="middle">+</text>
  </g>

  <!-- Row 5: 0 (double), ., = -->
  <g>
    <rect x="50" y="657" width="150" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="125" y="693" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">0</text>
    <rect x="210" y="657" width="70" height="58" rx="12" fill="url(#btnNum)" filter="url(#btnShadow)"/>
    <text x="245" y="693" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#fff" text-anchor="middle">.</text>
    <rect x="290" y="657" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="694" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#fff" text-anchor="middle">=</text>
  </g>

  <!-- sin button hover glow -->
  <rect x="212" y="180" width="67" height="38" rx="9" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <circle cx="245.5" cy="199" r="15" fill="rgba(255,255,255,0.03)"/>

  <!-- Decorative glass reflection -->
  <rect x="42" y="32" width="336" height="140" rx="26" fill="url(#glass)" opacity="0.08"/>
</svg>

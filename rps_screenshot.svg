<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="100%" height="100%">
  <defs>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c3bff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#6c3bff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6c3bff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="600" fill="#ffffff"/>

  <!-- Left side: Home page -->
  <rect x="0" y="0" width="410" height="600" fill="#ffffff"/>

  <!-- Floating emoji -->
  <text x="205" y="120" text-anchor="middle" font-size="36" font-family="Segoe UI, sans-serif">✊✋✌️</text>

  <!-- Title -->
  <text x="205" y="170" text-anchor="middle" font-size="22" font-weight="300" fill="#6b6b8d" font-family="Segoe UI, sans-serif" letter-spacing="4">ROCK PAPER SCISSORS</text>

  <!-- Play button glow ring -->
  <circle cx="205" cy="300" r="68" fill="none" stroke="url(#violetGrad)" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="205" cy="300" r="64" fill="none" stroke="url(#violetGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Play button -->
  <circle cx="205" cy="300" r="55" fill="url(#violetGrad)" filter="url(#shadow)"/>
  <text x="205" y="315" text-anchor="middle" font-size="36" fill="#fff" font-family="Segoe UI, sans-serif">▶</text>

  <!-- Tap to play -->
  <text x="205" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#9a9ab0" font-family="Segoe UI, sans-serif" letter-spacing="2">TAP TO PLAY</text>

  <!-- Sound toggle -->
  <rect x="375" y="15" width="24" height="24" rx="12" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="1.5"/>
  <text x="387" y="33" text-anchor="middle" font-size="13" fill="#6b6b8d">🔊</text>

  <!-- Divider -->
  <line x1="410" y1="20" x2="410" y2="580" stroke="#e8e6f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right side: Mode Selection -->
  <rect x="410" y="0" width="410" height="600" fill="#ffffff"/>

  <!-- Background orbs (subtle) -->
  <circle cx="615" cy="100" r="200" fill="#6c3bff" opacity="0.03"/>
  <circle cx="615" cy="450" r="180" fill="#b388ff" opacity="0.03"/>

  <!-- Game card -->
  <rect x="445" y="30" width="340" height="540" rx="24" fill="#fff" filter="url(#shadow)"/>

  <!-- Card inner -->
  <rect x="445" y="30" width="340" height="540" rx="24" fill="none" stroke="#e8e6f0" stroke-width="1"/>

  <!-- Violet top bar -->
  <rect x="469" y="30" width="292" height="3" rx="1.5" fill="url(#violetGrad)"/>

  <!-- Robot character -->
  <text x="615" y="120" text-anchor="middle" font-size="40">🤖</text>

  <!-- Badge -->
  <rect x="550" y="135" width="130" height="22" rx="11" fill="#f5f3ff"/>
  <text x="615" y="151" text-anchor="middle" font-size="9" font-weight="600" fill="#6c3bff" font-family="Segoe UI, sans-serif">🌀 Powered by Swarm Agents</text>

  <!-- Title -->
  <text x="615" y="185" text-anchor="middle" font-size="24" font-weight="800" fill="url(#titleGrad)" font-family="Segoe UI, sans-serif">Choose Your</text>
  <text x="615" y="215" text-anchor="middle" font-size="24" font-weight="800" fill="url(#titleGrad)" font-family="Segoe UI, sans-serif">Challenge</text>

  <!-- Subtitle -->
  <text x="615" y="245" text-anchor="middle" font-size="11" fill="#6b6b8d" font-family="Segoe UI, sans-serif">Select your match length and enter the arena</text>

  <!-- Hand icons -->
  <circle cx="565" cy="290" r="24" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="2"/>
  <text x="565" y="298" text-anchor="middle" font-size="18">✊</text>
  <circle cx="615" cy="290" r="24" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="2"/>
  <text x="615" y="298" text-anchor="middle" font-size="18">✋</text>
  <circle cx="665" cy="290" r="24" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="2"/>
  <text x="665" y="298" text-anchor="middle" font-size="18">✌️</text>

  <!-- Best of label -->
  <text x="615" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#9a9ab0" font-family="Segoe UI, sans-serif" letter-spacing="2">MATCH LENGTH</text>

  <!-- Best of 5 selected -->
  <rect x="530" y="345" width="60" height="30" rx="8" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="2"/>
  <text x="560" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#6b6b8d" font-family="Segoe UI, sans-serif">Best 3</text>

  <rect x="594" y="345" width="60" height="30" rx="8" fill="rgba(108,59,255,0.1)" stroke="#6c3bff" stroke-width="2"/>
  <text x="624" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#6c3bff" font-family="Segoe UI, sans-serif">Best 5</text>

  <rect x="658" y="345" width="60" height="30" rx="8" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="2"/>
  <text x="688" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#6b6b8d" font-family="Segoe UI, sans-serif">Best 7</text>

  <!-- Battle button -->
  <rect x="465" y="400" width="300" height="52" rx="12" fill="url(#violetGrad)" filter="url(#shadow)"/>
  <text x="615" y="432" text-anchor="middle" font-size="15" font-weight="700" fill="#fff" font-family="Segoe UI, sans-serif">⚔️ Find Your Opponent</text>

  <!-- Sound toggle in card -->
  <rect x="735" y="40" width="28" height="28" rx="14" fill="#f5f3ff" stroke="#e8e6f0" stroke-width="1.5"/>
  <text x="749" y="60" text-anchor="middle" font-size="14" fill="#6b6b8d">🔊</text>

  <!-- Bottom label -->
  <text x="615" y="480" text-anchor="middle" font-size="11" fill="#9a9ab0" font-family="Segoe UI, sans-serif">🎮 GameMaster  🧠 BotStrategist  📊 ScoreAnalyst  📖 Narrator</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 640" width="420" height="640">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2d2d3f"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30,30,46,0.68)"/>
      <stop offset="100%" stop-color="rgba(30,30,46,0.76)"/>
    </linearGradient>
    <linearGradient id="btnNum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(70,70,90,0.6)"/>
      <stop offset="100%" stop-color="rgba(60,60,80,0.6)"/>
    </linearGradient>
    <linearGradient id="btnFn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(120,120,140,0.4)"/>
      <stop offset="100%" stop-color="rgba(105,105,125,0.4)"/>
    </linearGradient>
    <linearGradient id="btnOp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,159,10,0.92)"/>
      <stop offset="100%" stop-color="rgba(240,145,5,0.92)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="opGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#ff9f0a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="640" fill="url(#bg)" rx="0"/>

  <!-- Calculator Window (centered at x=40, y=40 with 340px width) -->
  <g filter="url(#shadow)">
    <!-- Outer border glow -->
    <rect x="40" y="30" width="340" height="570" rx="28" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Glass background -->
    <rect x="40" y="30" width="340" height="570" rx="28" fill="url(#glass)"/>
    <!-- Inner highlight -->
    <rect x="40" y="30" width="340" height="570" rx="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </g>

  <!-- ========== HEADER ========== -->

  <!-- Window Controls -->
  <circle cx="62" cy="54" r="6.5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="82" cy="54" r="6.5" fill="#febc2e" opacity="0.9"/>
  <circle cx="102" cy="54" r="6.5" fill="#28c840" opacity="0.9"/>

  <!-- Mode Toggle -->
  <rect x="255" y="44" width="105" height="22" rx="11" fill="rgba(120,120,140,0.2)"/>
  <rect x="258" y="47" width="48" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="268" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">Basic</text>
  <text x="315" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">Sci</text>

  <!-- ========== DISPLAY ========== -->

  <!-- Mode indicator (hidden in basic mode) -->
  <!-- Expression line (shows previous calculation) -->
  <text x="356" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="end">42 + 7 =</text>

  <!-- Result -->
  <text x="356" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="300" fill="#ffffff" text-anchor="end" letter-spacing="-1">49</text>

  <!-- ========== BUTTONS ========== -->

  <!-- Row 1: AC, ±, %, ÷ -->
  <g>
    <!-- AC -->
    <rect x="50" y="180" width="70" height="58" rx="12" fill="url(#btnFn)"/>
    <text x="85" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#fff" text-anchor="middle">AC</text>
    <!-- ± -->
    <rect x="130" y="180" width="70" height="58" rx="12" fill="url(#btnFn)"/>
    <text x="165" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">±</text>
    <!-- % -->
    <rect x="210" y="180" width="70" height="58" rx="12" fill="url(#btnFn)"/>
    <text x="245" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">%</text>
    <!-- ÷ -->
    <rect x="290" y="180" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#fff" text-anchor="middle">÷</text>
  </g>

  <!-- Row 2: 7, 8, 9, × -->
  <g>
    <rect x="50" y="248" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="85" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">7</text>
    <rect x="130" y="248" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="165" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">8</text>
    <rect x="210" y="248" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="245" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">9</text>
    <rect x="290" y="248" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#fff" text-anchor="middle">×</text>
  </g>

  <!-- Row 3: 4, 5, 6, − -->
  <g>
    <rect x="50" y="316" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="85" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">4</text>
    <rect x="130" y="316" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="165" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">5</text>
    <rect x="210" y="316" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="245" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">6</text>
    <rect x="290" y="316" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#fff" text-anchor="middle">−</text>
  </g>

  <!-- Row 4: 1, 2, 3, + -->
  <g>
    <rect x="50" y="384" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="85" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">1</text>
    <rect x="130" y="384" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="165" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">2</text>
    <rect x="210" y="384" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="245" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">3</text>
    <rect x="290" y="384" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="421" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#fff" text-anchor="middle">+</text>
  </g>

  <!-- Row 5: 0 (double), ., = -->
  <g>
    <rect x="50" y="452" width="150" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="125" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#fff" text-anchor="middle">0</text>
    <rect x="210" y="452" width="70" height="58" rx="12" fill="url(#btnNum)"/>
    <text x="245" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#fff" text-anchor="middle">.</text>
    <rect x="290" y="452" width="70" height="58" rx="12" fill="url(#btnOp)" filter="url(#opGlow)"/>
    <text x="325" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#fff" text-anchor="middle">=</text>
  </g>

  <!-- Subtle "42 + 7 =" highlight on the = button to show it was pressed -->
  <rect x="290" y="452" width="70" height="58" rx="12" fill="#fff" opacity="0.15"/>
  <rect x="290" y="452" width="70" height="58" rx="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Hover glow on ÷ button to indicate active operator -->
  <circle cx="325" cy="207" r="18" fill="rgba(255,255,255,0.05)"/>

  <!-- Decorative glass reflection -->
  <rect x="42" y="32" width="336" height="140" rx="26" fill="url(#glass)" opacity="0.08"/>
</svg>
